<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartStock Pro — Run Your Business Like a Pro</title>
  <meta name="description" content="Enterprise business management platform for tile stores, hardware shops, wholesale & retail."/>
  <meta name="theme-color" content="#E8A020"/>
  <link rel="manifest" href="pwa/manifest.json"/>
  <link rel="icon" href="assets/icons/favicon.ico"/>
  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css"/>
  <link rel="stylesheet" href="css/layout.css"/>
  <link rel="stylesheet" href="css/components.css"/>
  <link rel="stylesheet" href="css/dashboard.css"/>
  <link rel="stylesheet" href="css/tables.css"/>
  <link rel="stylesheet" href="css/forms.css"/>
  <link rel="stylesheet" href="css/responsive.css"/>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>
  <div id="app">
    <!-- Rendered by router.js -->

  <!-- Core JS (order matters) -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/mock-data.js"></script>

  <script src="services/notification-service.js"></script>

  <script src="js/components.js"></script>

  <script src="js/router.js"></script>
  <script src="js/app.js"></script>

  <script src="js/dashboard.js"></script>

  <script src="js/sales.js"></script>
  <script src="js/customers.js"></script>
  <script src="js/suppliers.js"></script>
  <script src="js/expenses.js"></script>
  <script src="js/payroll.js"></script>

  <script src="js/ai.js"></script>
  <script src="js/settings.js"></script>

  <script>
    window.addEventListener('load', () => {
      App.init();
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('pwa/service-worker.js');
      }
    });
