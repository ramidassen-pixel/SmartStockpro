<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#070A12">
<title>Reset Password — SmartStock Pro</title>
<style>
  :root {
    --bg:  #070A12;
    --bg3: #111525;
    --bg5: #1D2238;
    --g:   #D4A843;
    --t1:  #EDEFF7;
    --t2:  #9AA1B9;
    --ok:  #3DD68C;
    --err: #FF6B6B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--t1);
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
    background: radial-gradient(120% 80% at 50% 0%, #0E1322 0%, var(--bg) 60%);
  }
  .brand { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
  .brand-sub {
    color: var(--g); font-size: 11px; font-weight: 600;
    letter-spacing: 0.28em; text-transform: uppercase; margin-bottom: 40px;
  }
  .card {
    width: 100%; max-width: 420px; text-align: left;
    background: linear-gradient(180deg, var(--bg3), rgba(17,21,37,.6));
    border: 1px solid var(--bg5); border-radius: 18px;
    padding: 32px 26px 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,.45);
  }
  h1 { font-size: 21px; text-align: center; margin-bottom: 6px; }
  p.sub { color: var(--t2); font-size: 14px; text-align: center; margin-bottom: 24px; line-height: 1.6; }
  label { display: block; font-size: 12px; font-weight: 600; letter-spacing: .06em;
          text-transform: uppercase; color: var(--t2); margin: 16px 0 6px; }
  .pw-wrap { position: relative; }
  input {
    width: 100%; padding: 14px 46px 14px 14px;
    background: var(--bg); color: var(--t1);
    border: 1px solid var(--bg5); border-radius: 10px;
    font-size: 16px; outline: none;
  }
  input:focus { border-color: var(--g); }
  .eye {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    background: none; border: none; font-size: 18px; padding: 8px; cursor: pointer;
  }
  .msg { display: none; margin-top: 16px; padding: 12px 14px; border-radius: 10px; font-size: 14px; }
  .msg.err { display: block; background: rgba(255,107,107,.10); border: 1px solid rgba(255,107,107,.35); color: var(--err); }
  .msg.ok  { display: block; background: rgba(61,214,140,.10); border: 1px solid rgba(61,214,140,.35); color: var(--ok); }
  .btn {
    display: block; width: 100%; margin-top: 22px;
    padding: 15px 18px; border: none; border-radius: 12px;
    background: linear-gradient(135deg, #E7C468, var(--g));
    color: #14100A; font-size: 16px; font-weight: 700;
    cursor: pointer; box-shadow: 0 6px 24px rgba(212,168,67,.35);
  }
  .btn:disabled { opacity: .55; }
  .btn.link {
    background: none; box-shadow: none; color: var(--g);
    font-size: 14px; margin-top: 10px; text-decoration: none; text-align: center;
  }
  .foot { margin-top: 28px; color: var(--t2); font-size: 12px; }
</style>
</head>
<body>

  <div class="brand">SmartStock Pro</div>
  <div class="brand-sub">Business Management System</div>

  <div class="card">
    <h1>🔑 Set a New Password</h1>
    <p class="sub" id="sub-text">Choose a new password for your account.</p>

    <div id="form-area">
      <label for="pw1">New password (min 8 chars, uppercase + number)</label>
      <div class="pw-wrap">
        <input id="pw1" type="password" autocomplete="new-password">
        <button type="button" class="eye" onclick="toggle('pw1')">👁</button>
      </div>

      <label for="pw2">Confirm new password</label>
      <div class="pw-wrap">
        <input id="pw2" type="password" autocomplete="new-password">
        <button type="button" class="eye" onclick="toggle('pw2')">👁</button>
      </div>

      <div id="msg" class="msg"></div>

      <button id="save-btn" class="btn" onclick="savePassword()">Save New Password</button>
    </div>

    <a class="btn link" href="index.html">← Back to Sign In</a>
  </div>

  <div class="foot">SmartStock Pro · Rock Stone · Monrovia, Liberia</div>

<script>
(function () {
  var SUPABASE_AUTH_URL = 'https://ovbtqkpvhivqnnxojjwu.supabase.co/auth/v1';
  var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92YnRxa3B2aGl2cW5ueG9qand1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMTQ1NDEsImV4cCI6MjA5Njc5MDU0MX0.TZ_B5NBC3uIyqMYs442umeoi3o78CCwTZW6YgHS9efw';

  // Parse tokens Supabase puts in the URL hash: #access_token=...&type=recovery
  var params = {};
  location.hash.replace(/^#/, '').split('&').forEach(function (kv) {
    var p = kv.split('=');
    if (p[0]) params[p[0]] = decodeURIComponent(p[1] || '');
  });

  window._recovery = params;

  var msg = document.getElementById('msg');
  var formArea = document.getElementById('form-area');
  var subText = document.getElementById('sub-text');

  if (params.error_description) {
    formArea.style.display = 'none';
    subText.textContent = '';
    msg.className = 'msg err';
    msg.textContent = decodeURIComponent(params.error_description).replace(/\+/g, ' ')
      + ' — request a new reset link from the sign-in screen.';
  } else if (!params.access_token || params.type !== 'recovery') {
    formArea.style.display = 'none';
    subText.textContent = '';
    msg.className = 'msg err';
    msg.textContent = 'This page must be opened from the reset link in your email. Request a new link from the sign-in screen.';
  }

  window.toggle = function (id) {
    var el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
  };

  window.savePassword = function () {
    var pw1 = document.getElementById('pw1').value;
    var pw2 = document.getElementById('pw2').value;
    msg.className = 'msg'; msg.textContent = '';

    if (pw1.length < 8 || !/[A-Z]/.test(pw1) || !/[a-z]/.test(pw1) || !/[0-9]/.test(pw1)) {
      msg.className = 'msg err';
      msg.textContent = 'Password must be at least 8 characters with uppercase, lowercase and a number.';
      return;
    }
    if (pw1 !== pw2) {
      msg.className = 'msg err';
      msg.textContent = 'Passwords do not match.';
      return;
    }

    var btn = document.getElementById('save-btn');
    btn.disabled = true; btn.textContent = 'Saving…';

    fetch(SUPABASE_AUTH_URL + '/user', {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON,
        'Authorization': 'Bearer ' + window._recovery.access_token,
      },
      body: JSON.stringify({ password: pw1 }),
    })
    .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
    .then(function (res) {
      btn.disabled = false; btn.textContent = 'Save New Password';
      if (!res.ok) {
        msg.className = 'msg err';
        msg.textContent = (res.data && (res.data.msg || res.data.error_description)) || 'Could not update password. The link may have expired — request a new one.';
        return;
      }
      formArea.style.display = 'none';
      subText.innerHTML = '✅ <strong style="color:var(--ok)">Password updated!</strong><br>You can now sign in with your new password.';
    })
    .catch(function () {
      btn.disabled = false; btn.textContent = 'Save New Password';
      msg.className = 'msg err';
      msg.textContent = 'Network error — check your connection and try again.';
    });
  };
})();
</script>
</body>
</html>
