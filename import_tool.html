function log(msg, cls) {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function hdr() {
  return {
    'Content-Type': 'application/json',
    'apikey': SUPABASE_ANON,
    'Authorization': 'Bearer ' + SUPABASE_ANON,
    'Prefer': 'resolution=merge-duplicates,return=minimal'
  };
}

async function pushBatch(table, rows, mapFn, onConflictCols) {
  const body = rows.map(mapFn);
  const url = SUPABASE_URL + '/rest/v1/' + table + '?on_conflict=' + onConflictCols;
  const res = await fetch(url, {
    method: 'POST',
    headers: hdr(),
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error(table + ' batch failed: ' + res.status + ' ' + text);
  }
}

function mapSale(row) {
  const [id, date, customer, amount, method, invoice, notes, entryBy] = row;
  return {
    id: id,
    business_id: BIZ_ID,
    deleted: false,
    data: {
      id: id, date: date, customer: customer,
      total: amount, amountPaid: amount, balance: 0,
      paymentStatus: 'paid', paymentMethod: method, invoiceNo: invoice,
      notes: notes, createdBy: entryBy, items: [],
      source: 'cashbook_import', createdAt: date
    }
  };
}

function mapExpense(row) {
  const [id, date, description, amount, category, method, entryBy] = row;
  return {
    id: id,
    business_id: BIZ_ID,
    deleted: false,
    data: {
      id: id, date: date, description: description,
      amount: amount, category: category, paymentMethod: method,
      createdBy: entryBy, source: 'cashbook_import', createdAt: date
    }
  };
}

async function runImport() {
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.textContent = 'Importing...';
  log('Starting import...', 'info');

  const sales = PAYLOAD.sales;
  const expenses = PAYLOAD.expenses;
  log('Sales to import: ' + sales.length, 'info');
  log('Expenses to import: ' + expenses.length, 'info');

  const BATCH = 50;
  let salesImported = 0;
  let expensesImported = 0;

  try {
    for (let i = 0; i < sales.length; i += BATCH) {
      const chunk = sales.slice(i, i + BATCH);
      await pushBatch('biz_sales', chunk, mapSale, 'id,business_id');
      salesImported += chunk.length;
      log('Sales imported: ' + salesImported + ' / ' + sales.length, 'ok');
    }

    for (let i = 0; i < expenses.length; i += BATCH) {
      const chunk = expenses.slice(i, i + BATCH);
      await pushBatch('biz_expenses', chunk, mapExpense, 'id,business_id');
      expensesImported += chunk.length;
      log('Expenses imported: ' + expensesImported + ' / ' + expenses.length, 'ok');
    }

    log('', null);
    log('✅ IMPORT COMPLETE!', 'ok');
    log('Total sales imported: ' + salesImported, 'ok');
    log('Total expenses imported: ' + expensesImported, 'ok');
    log('', null);
    log('You can now close this page and delete this file from your GitHub repo.', 'info');
    btn.textContent = 'Import Complete ✅';
  } catch (err) {
    log('❌ ERROR: ' + err.message, 'err');
    log('You can tap Start Import again to retry — already-imported records will be skipped safely.', 'err');
    btn.disabled = false;
    btn.textContent = 'Retry Import';
  }
}
